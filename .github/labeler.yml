gem:
  - changed-files:
      - any-glob-to-any-file: 'lib/**/*'

tests:
  - changed-files:
      - any-glob-to-any-file: 'spec/**/*'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**/*'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'README*'
          - 'CHANGELOG*'
          - 'LICENSE*'
