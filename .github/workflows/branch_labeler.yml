name: Branch Labeler

# This workflow uses pull_request_target intentionally.
# It only adds labels based on branch name prefix — no checkout or code execution.
on:
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const prefixMap = {
              'refactor/': 'refactor',
              'feat/': 'enhancement',
              'feature/': 'enhancement',
              'fix/': 'bugfix',
              'bugfix/': 'bugfix',
              'chore/': 'chore',
              'perf/': 'performance',
              'deps/': 'dependencies',
            };

            for (const [prefix, label] of Object.entries(prefixMap)) {
              if (branch.startsWith(prefix)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [label],
                });
                core.info(`Added label: ${label}`);
                break;
              }
            }
