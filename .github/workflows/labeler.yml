name: Labeler

# This workflow uses pull_request_target intentionally.
# It only adds labels based on file paths — no checkout or code execution.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9  # v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false
