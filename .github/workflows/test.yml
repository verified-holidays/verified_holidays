name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        ruby-version: ["3.1", "3.2", "3.3", "3.4"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64  # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Run RuboCop
        run: bundle exec rake rubocop

      - name: Upload coverage to Qlty
        if: matrix.ruby-version == '3.4'
        uses: qltysh/qlty-action/coverage@141b881236146435192435eb7b0e06ea0b70b4d9  # main
        with:
          coverage-files: coverage/.resultset.json
